<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anliegen Voting - Demokratie Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="swipe-page">
    <div class="header">
        <div class="header-title">💡 Anliegen-Voting</div>
        <div class="header-subtitle">Teile deine Gedanken - Swipen links/rechts</div>
    </div>

    <div class="container">
        <div class="swipe-hints">
            <div class="swipe-hint-left">👈 Nicht relevant</div>
            <div class="swipe-hint-right">Relevant 👉</div>
        </div>

        

        <div class="swipe-wrapper" id="swipeWrapper">
            <div id="stickyNoteContainer"><div class="sticky-note" id="currentSticky">Kotzen</div></div>
        </div>

        <!-- FAB ersetzt den alten Add-Button -->
        <button class="fab" id="fabButton" onclick="openAddConcernModal()" title="Neues Anliegen hinzufügen">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
        </button>
    </div>

    <!-- MODAL -->
    <div id="addConcernModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">💡 Dein Anliegen teilen</div>
            <div class="modal-description">Was liegt dir am Herzen? Lass es die anderen wissen!</div>
            <textarea id="concernText" class="modal-input" placeholder="Schreib hier dein Anliegen (z.B. 'Bessere Kaffeequalität im Büro')..." maxlength="200"></textarea>
            <div class="character-count"><span id="charCount">0</span>/200</div>
            <div class="modal-buttons">
                <button class="modal-button cancel" onclick="closeAddConcernModal()">Abbrechen</button>
                <button class="modal-button confirm" onclick="submitConcern()">Hochswipen 📤</button>
            </div>
        </div>
    </div>

    <!-- Moderne Bottom-Navigation (ersetzt den alten Footer) -->
    <nav class="bottom-nav">
        <a href="voting.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                <line x1="9" y1="9" x2="9.01" y2="9"/>
                <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
            <span>Voting</span>
        </a>
        <a href="concerns.html" class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
            </svg>
            <span>Anliegen</span>
        </a>
        <a href="dashboard.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"/>
                <rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/>
            </svg>
            <span>Dashboard</span>
        </a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
